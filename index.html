<!DOCTYPE html>
<html>
<head>
    <title>My Styled Website</title>
    <style>
        /* This section controls all the design and colors */
        body {
            background-color: #e6f2ff; /* Light blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Clean, modern writing style for text */
            color: #333333; /* Dark grey text for easy reading */
            text-align: center; /* Centers all the text */
            margin-top: 50px;
        }

        h1 {
            font-family: 'Georgia', serif; /* Elegant, classic writing style for the main title */
            color: #00509e; /* Deep blue color for the title */
            font-size: 40px; /* Makes the title larger */
        }

        p {
            font-size: 18px; 
            line-height: 1.6; /* Adds breathing room between lines of text */
        }

        /* This creates a white box to hold your content */
        .theme-box {
            background-color: white;
            padding: 40px;
            border-radius: 15px; /* Rounds the corners of the box */
            width: 60%;
            margin: auto; /* Centers the box on the screen */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); /* Adds a subtle shadow behind the box */
        }
    </style>
</head>
<body>

    <div class="theme-box">
        <h1>Hello, World!</h1>
        <h2>Welcome to my newly designed website</h2>
        <p>I am learning how to use CSS to change background colors, mix different writing styles, and create clean layouts.</p>
    </div>

</body>
</html>
